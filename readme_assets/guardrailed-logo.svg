<svg width="960" height="210" viewBox="0 0 960 210" xmlns="http://www.w3.org/2000/svg">
  <rect width="960" height="210" rx="12" fill="#0d1117"/>

  <!-- Window dots -->
  <circle cx="28" cy="26" r="6" fill="#ff5f57"/>
  <circle cx="50" cy="26" r="6" fill="#febc2e"/>
  <circle cx="72" cy="26" r="6" fill="#28c840"/>

  <!-- Divider line -->
  <line x1="0" y1="46" x2="960" y2="46" stroke="#30363d" stroke-width="1"/>

  <!-- ASCII art - lean font, GUARDRAILED on single line -->
  <text font-family="'Courier New', Courier, monospace" font-size="11.2" fill="#58a6ff" xml:space="preserve">
    <tspan x="20" y="72">     _/_/_/  _/    _/    _/_/    _/_/_/    _/_/_/    _/_/_/      _/_/    _/_/_/  _/        _/_/_/_/  _/_/_/</tspan>
    <tspan x="20" dy="15">  _/        _/    _/  _/    _/  _/    _/  _/    _/  _/    _/  _/    _/    _/    _/        _/        _/    _/</tspan>
    <tspan x="20" dy="15"> _/  _/_/  _/    _/  _/_/_/_/  _/_/_/    _/    _/  _/_/_/    _/_/_/_/    _/    _/        _/_/_/    _/    _/</tspan>
    <tspan x="20" dy="15">_/    _/  _/    _/  _/    _/  _/    _/  _/    _/  _/    _/  _/    _/    _/    _/        _/        _/    _/</tspan>
    <tspan x="20" dy="15"> _/_/_/    _/_/    _/    _/  _/    _/  _/_/_/    _/    _/  _/    _/  _/_/_/  _/_/_/_/  _/_/_/_/  _/_/_/</tspan>
  </text>

  <!-- Separator -->
  <text font-family="'Courier New', Courier, monospace" font-size="11" fill="#30363d" x="20" y="165">────────────────────────────────────────────────────────────────────────────────────────────────</text>

  <!-- Tagline -->
  <text font-family="'Courier New', Courier, monospace" font-size="12" fill="#8b949e" letter-spacing="3" x="20" y="185">──  AI GUARDRAIL PLATFORM  ──</text>

  <!-- Prompt + blinking cursor -->
  <text font-family="'Courier New', Courier, monospace" font-size="13" fill="#3fb950" x="20" y="202">$</text>
  <rect x="33" y="190" width="8" height="13" fill="#58a6ff">
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
  </rect>
</svg>
